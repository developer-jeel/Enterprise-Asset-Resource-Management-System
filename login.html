<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AssetFlow — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #1a1410;
    --ink-soft: #4a4038;
    --muted: #8a8078;
    --line: #eae4dc;
    --panel: #fffdfb;
    --field-bg: #ffffff;
    --field-border: #e5ddd3;
    --accent: #ef6c1f;
    --accent-2: #f2861f;
    --accent-deep: #c9430a;
    --bg-right: #f7f3ee;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html, body{
    height:100%;
    font-family: 'Manrope', sans-serif;
    color: var(--ink);
    background: var(--bg-right);
  }

  .screen{
    min-height:100vh;
    display:grid;
    grid-template-columns: 1.05fr 1fr;
  }

  /* ---------- LEFT PANEL ---------- */
  .hero{
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding: 44px 56px 56px;
    background:
      radial-gradient(120% 90% at 15% 10%, #ffcf4d 0%, transparent 55%),
      radial-gradient(100% 80% at 55% 45%, #ff9a1f 0%, transparent 60%),
      radial-gradient(120% 100% at 75% 90%, #c53d0a 0%, transparent 55%),
      linear-gradient(160deg, #ffb020 0%, #ff7a1a 45%, #e0470f 100%);
    color:#fff;
  }

  .hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(60% 40% at 30% 30%, rgba(255,255,255,0.18), transparent 60%),
      radial-gradient(50% 35% at 70% 70%, rgba(120,20,0,0.25), transparent 65%);
    mix-blend-mode: overlay;
    pointer-events:none;
  }

  .brand{
    position:relative;
    z-index:2;
    display:flex;
    align-items:center;
    gap:14px;
  }

  .brand-mark{
    width:52px; height:52px;
    border-radius:16px;
    background:rgba(255,255,255,0.22);
    backdrop-filter: blur(6px);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 4px 18px rgba(0,0,0,0.12), inset 0 0 0 1px rgba(255,255,255,0.35);
  }
  .brand-mark svg{ width:26px; height:26px; }

  .brand-name{
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size:1.5rem;
    letter-spacing:-0.01em;
  }

  .hero-copy{
    position:relative;
    z-index:2;
    max-width:520px;
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    opacity:0.85;
    margin-bottom:14px;
    display:block;
  }

  .hero-title{
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size:3.15rem;
    line-height:1.05;
    letter-spacing:-0.02em;
    margin-bottom:22px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.08);
  }

  .hero-desc{
    font-size:1.02rem;
    line-height:1.6;
    color:rgba(255,255,255,0.92);
    max-width:460px;
  }

  /* ---------- RIGHT PANEL ---------- */
  .stage{
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 40px;
    background:
      radial-gradient(60% 50% at 85% 15%, #ffd9b8 0%, transparent 60%),
      var(--bg-right);
  }

  .card{
    width:100%;
    max-width:460px;
    background: var(--panel);
    border-radius:22px;
    padding: 40px 40px 32px;
    box-shadow:
      0 1px 2px rgba(20,10,0,0.04),
      0 20px 50px -20px rgba(20,10,0,0.18),
      inset 0 0 0 1px rgba(20,10,0,0.04);
  }

  .card-eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:0.68rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color: var(--muted);
    margin-bottom:8px;
  }

  .card-title{
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size:2rem;
    letter-spacing:-0.02em;
    margin-bottom:8px;
  }

  .card-sub{
    color: var(--ink-soft);
    font-size:0.95rem;
    margin-bottom:28px;
  }

  .field{
    margin-bottom:20px;
  }

  .field label{
    display:block;
    font-size:0.7rem;
    font-weight:700;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color: var(--muted);
    margin-bottom:8px;
  }

  .field input{
    width:100%;
    padding: 14px 16px;
    border-radius:12px;
    border:1.5px solid var(--field-border);
    background: var(--field-bg);
    font-family:'Manrope', sans-serif;
    font-size:0.95rem;
    color: var(--ink);
    outline:none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }

  .field input::placeholder{ color:#b9b0a6; }

  .field input:focus{
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(239,108,31,0.14);
  }

  .btn-signin{
    width:100%;
    padding:15px;
    border:none;
    border-radius:999px;
    background: linear-gradient(135deg, var(--accent-2), var(--accent-deep));
    color:#fff;
    font-family:'Manrope', sans-serif;
    font-weight:700;
    font-size:1rem;
    letter-spacing:0.01em;
    cursor:pointer;
    box-shadow: 0 10px 24px -8px rgba(216,70,10,0.55);
    transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    margin-top:6px;
  }

  .btn-signin:hover{
    transform: translateY(-1px);
    filter: brightness(1.03);
    box-shadow: 0 14px 30px -8px rgba(216,70,10,0.6);
  }

  .btn-signin:active{ transform: translateY(0); }

  .signup-row{
    text-align:center;
    margin-top:20px;
    font-size:0.9rem;
    color: var(--ink-soft);
  }

  .signup-row a{
    color: var(--accent-deep);
    font-weight:700;
    text-decoration:none;
  }
  .signup-row a:hover{ text-decoration:underline; }

  /* Responsive */
  @media (max-width: 880px){
    .screen{ grid-template-columns: 1fr; }
    .hero{
      min-height: 300px;
      padding: 32px 28px 40px;
    }
    .hero-title{ font-size:2.1rem; }
    .hero-desc{ display:none; }
    .stage{ padding: 28px; }
    .card{ padding: 32px 26px 28px; }
  }

  :focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
</style>
</head>
<body>

<div class="screen">

  <!-- LEFT: brand + hero copy -->
  <section class="hero">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C12 2 6 9.5 6 14a6 6 0 0 0 12 0c0-4.5-6-12-6-12z" fill="#ffffff"/>
        </svg>
      </div>
      <span class="brand-name">AssetFlow</span>
    </div>

    <div class="hero-copy">
      <span class="eyebrow">Liquid ERP</span>
      <h1 class="hero-title">Every asset,<br>in perfect flow.</h1>
      <p class="hero-desc">
        Track lifecycles, allocate without conflict, book rooms without
        overlap, and audit with confidence — one calm surface for the
        whole organization.
      </p>
    </div>
  </section>

  <!-- RIGHT: sign-in card -->
  <section class="stage">
    <form class="card" autocomplete="off">
      <div class="card-eyebrow">Sign in</div>
      <h2 class="card-title">Welcome back.</h2>
      <p class="card-sub">Enter your credentials to continue.</p>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••••">
      </div>

      <button type="submit" class="btn-signin">Sign in</button>

      <p class="signup-row">No account? <a href="#">Create one</a></p>
    </form>
  </section>

</div>

</body>
</html>
