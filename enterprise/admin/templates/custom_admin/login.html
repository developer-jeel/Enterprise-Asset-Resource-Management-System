{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AssetFlow Admin Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />
  <link rel="stylesheet" href="{% static 'css/main2.css' %}" />
</head>
<body>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

{% if messages %}
<div class="toast-container" id="toastContainer" style="position:fixed;top:20px;right:20px;z-index:9999;">
  {% for message in messages %}
    <div class="toast toast-{{ message.tags }}" style="background:#ef4444;color:#fff;padding:12px 20px;border-radius:8px;margin-bottom:8px;font-size:14px;">
      {{ message }}
    </div>
  {% endfor %}
</div>
{% endif %}

<!-- Auth Shell -->
<div id="authShell">
  <div class="auth-page ae-scale ae-d1 in">
    <div class="auth-bg-pattern"></div>
    <div class="auth-card ae ae-d2 in">
      
      <div class="auth-logo">
        <div class="auth-logo-icon">AF</div>
        <div class="auth-logo-name">AssetFlow</div>
      </div>
      
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Please enter your details to sign in.</p>
      
      <form id="loginForm" method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Email <span class="required">*</span></label>
          <input type="email" name="email" class="input" id="loginEmail" placeholder="name@assetflow.io" required />
        </div>
        
        <div class="form-group">
          <div class="flex justify-between items-center mb-2">
            <label class="form-label mb-0">Password <span class="required">*</span></label>
          </div>
          <div class="input-group has-suffix">
            <input type="password" name="password" class="input" id="loginPassword" placeholder="••••••••" required />
            <i class="ri-eye-line input-suffix" style="cursor:pointer" onclick="togglePassword()"></i>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-full btn-lg mt-6" id="loginBtn">
          Sign In <i class="ri-arrow-right-line"></i>
        </button>
      </form>

    </div>
  </div>
</div>

<script src="{% static 'js/app.js' %}"></script>
<script>
  function togglePassword() {
    const input = document.getElementById('loginPassword');
    input.type = input.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
