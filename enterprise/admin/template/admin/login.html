<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AssetFlow — Login" />
  <title>Login — AssetFlow</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Auth Shell -->
<div id="authShell">
  <div class="auth-page ae-scale ae-d1 in">
    <div class="auth-bg-pattern"></div>
    <div class="auth-card ae ae-d2 in">
      
      <div class="auth-logo">
        <div class="auth-logo-icon">AF</div>
        <div class="auth-logo-name">AssetFlow</div>
      </div>
      
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Please enter your details to sign in.</p>
      
      <!-- Quick Role Selector for Demo -->
      <div class="form-group mb-5">
        <label class="form-label">Demo Role Selection <span class="form-helper">(Auto-fills credentials)</span></label>
        <div class="role-selector">
          <div class="role-option" onclick="Auth.fillDemo('u1')">
            <div class="role-option-icon text-primary"><i class="ri-shield-user-line"></i></div>
            <div class="role-option-label">Admin</div>
          </div>
          <div class="role-option" onclick="Auth.fillDemo('u2')">
            <div class="role-option-icon text-primary"><i class="ri-settings-4-line"></i></div>
            <div class="role-option-label">Manager</div>
          </div>
          <div class="role-option" onclick="Auth.fillDemo('u3')">
            <div class="role-option-icon text-primary"><i class="ri-building-line"></i></div>
            <div class="role-option-label">Dept Head</div>
          </div>
          <div class="role-option" onclick="Auth.fillDemo('u4')">
            <div class="role-option-icon text-primary"><i class="ri-user-line"></i></div>
            <div class="role-option-label">Employee</div>
          </div>
        </div>
      </div>

      <div class="auth-divider">
        <div class="auth-divider-line"></div>
        <div class="auth-divider-text">OR LOGIN MANUALLY</div>
        <div class="auth-divider-line"></div>
      </div>

      <form id="loginForm" onsubmit="event.preventDefault(); Auth.doLogin();">
        <div class="form-group">
          <label class="form-label">Email <span class="required">*</span></label>
          <input type="email" class="input" id="loginEmail" placeholder="name@assetflow.io" required />
        </div>
        
        <div class="form-group">
          <div class="flex justify-between items-center mb-2">
            <label class="form-label mb-0">Password <span class="required">*</span></label>
            <a href="forgot-password.html" class="text-xs auth-link">Forgot password?</a>
          </div>
          <div class="input-group has-suffix">
            <input type="password" class="input" id="loginPassword" placeholder="••••••••" required />
            <i class="ri-eye-line input-suffix" style="cursor:pointer" onclick="Auth.togglePassword('loginPassword')"></i>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-full btn-lg mt-6" id="loginBtn">
          Sign In <i class="ri-arrow-right-line"></i>
        </button>
      </form>

    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script src="js/pages/auth.js"></script>
</body>
</html>
